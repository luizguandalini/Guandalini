services:
  db:
    image: postgres:16-alpine
    container_name: guandalini-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    container_name: guandalini-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_ROLE: ${ADMIN_ROLE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      API_PORT: ${API_PORT}
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"   # reliable file watching on bind mounts
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      # Bind-mount source → hot reload (tsx watch picks up changes)
      - ./server:/app
      # Anonymous volume keeps container's node_modules so the host's
      # Windows FS doesn't shadow them with an empty/broken copy.
      - /app/node_modules
      # Uploaded files persist on the host
      - ./server/uploads:/app/uploads

volumes:
  pgdata:
