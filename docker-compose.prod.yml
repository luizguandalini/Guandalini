services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: prod
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-traefik-proxy}"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-guandalini}.rule=Host(`${APP_DOMAIN:?Set APP_DOMAIN in .env}`) || Host(`www.${APP_DOMAIN:?Set APP_DOMAIN in .env}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-guandalini}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-guandalini}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-guandalini}.loadbalancer.server.port=80"
    networks:
      - default
      - traefik-proxy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      ADMIN_ROLE: ${ADMIN_ROLE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      API_PORT: ${API_PORT}
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    expose:
      - "${API_PORT}"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${API_PORT}/api/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  pgdata:
  uploads:

networks:
  traefik-proxy:
    name: ${TRAEFIK_NETWORK:-traefik-proxy}
    external: true
